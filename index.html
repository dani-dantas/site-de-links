<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Links</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <div id="parent">
        <div id="content">
            <div id="foto"></div>
            <h1>Me siga nas redes:</h1>
            <button class="buttons insta" onclick="window.open('https://www.instagram.com/danidantx/'), '_blank'">
                <img src="assets/instagram.png">
                <p>Instagram</p>
            </button>
            <button class="buttons" onclick="window.open('https://www.tiktok.com/@danielladev'), '_blank'">
                <img src="assets/tiktok.png">
                <p>TikTok</p>
            </button>
            <button class="buttons" onclick="window.open('https://www.youtube.com/@DaniellaDev'), '_blank'">
                <img src="assets/youtube.png">
                <p>YouTube</p>
            </button>
            <button class="buttons" onclick="window.open('https://www.linkedin.com/in/daniella-dantas/'), '_blank'">
                <img src="assets/linkedin.png">
                <p>LinkedIn</p>
            </button>
        </div>
    </div>
    
</body>
</html>
